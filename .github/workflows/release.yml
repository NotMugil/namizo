name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          TVDB_API_KEY: ${{ secrets['TVDB_API_KEY'] }}
          TVDB_PIN: ${{ secrets['TVDB_PIN'] }}
        run: |
          BUILD_CMD="flutter build apk --release"
          if [ -n "$TVDB_API_KEY" ]; then
            BUILD_CMD="$BUILD_CMD --dart-define=TVDB_API_KEY=$TVDB_API_KEY"
          fi
          if [ -n "$TVDB_PIN" ]; then
            BUILD_CMD="$BUILD_CMD --dart-define=TVDB_PIN=$TVDB_PIN"
          fi
          eval "$BUILD_CMD"

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/namizo-v${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Namizo ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/namizo-v${{ steps.version.outputs.version }}.apk
