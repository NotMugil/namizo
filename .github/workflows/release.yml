name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Decode keystore
        run: |
          base64 --decode > android/app/namizo.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=namizo
          storeFile=app/namizo.jks
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APKs (split per ABI)
        env:
          TVDB_API_KEY: ${{ secrets['TVDB_API_KEY'] }}
          ANILIST_CLIENT_ID: ${{ secrets['ANILIST_CLIENT_ID'] }}
        run: |
          BUILD_CMD="flutter build apk --split-per-abi --release"
          if [ -n "$TVDB_API_KEY" ]; then
            BUILD_CMD="$BUILD_CMD --dart-define=TVDB_API_KEY=$TVDB_API_KEY"
          fi
          if [ -n "$ANILIST_CLIENT_ID" ]; then
            BUILD_CMD="$BUILD_CMD --dart-define=ANILIST_CLIENT_ID=$ANILIST_CLIENT_ID"
          fi
          eval "$BUILD_CMD"

      - name: Rename APKs
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk     namizo-v${VERSION}-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk   namizo-v${VERSION}-armeabi-v7a.apk
          mv app-x86_64-release.apk        namizo-v${VERSION}-x86_64.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Namizo ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/namizo-v${{ steps.version.outputs.version }}-arm64-v8a.apk
            build/app/outputs/flutter-apk/namizo-v${{ steps.version.outputs.version }}-armeabi-v7a.apk
            build/app/outputs/flutter-apk/namizo-v${{ steps.version.outputs.version }}-x86_64.apk
